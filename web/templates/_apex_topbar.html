<div class="topbar">
  {% set p = request.url.path %}
  <div class="topbar-left">
    <a href="/" class="{{ 'on' if p == '/' }}">ValorLink</a>
    <a href="/find" class="{{ 'on' if p == '/find' }}">Find a Unit</a>
    {% if user %}<a href="/my-units" class="{{ 'on' if p == '/my-units' }}">My Units</a>{% endif %}
    {% if user %}<a href="/register" class="{{ 'on' if p == '/register' }}">Raise a Unit</a>{% endif %}
  </div>
  <div class="topbar-right">
    {% if user %}
      <span class="who">Signed in as <b>{{ user.name }}</b></span>
      <a href="/logout">Sign out</a>
    {% else %}
      <a href="/auth/discord/login">Sign in with Discord</a>
    {% endif %}
  </div>
</div>
